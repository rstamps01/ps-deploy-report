advanced_operations:
  autofill_default_passwords: true
  default_mode: reporter
  default_switch_placement: manual
  defaults:
    include_health: true
    include_report: true
    log_bundle: true
    network_config: true
    pre_validation: true
    support_tool: true
    switch_config: true
    vnetmap: true
    vperfsanity: false
  reporter_defaults:
    health_check: true
    pre_validation: true
    run_reporter: true
api:
  max_retries: 3
  retry_delay: 2
  timeout: 30
  verify_ssl: false
  version: v7
data_collection:
  concurrent_requests: 5
  graceful_degradation: true
  sections:
    cluster_information: true
    data_protection: true
    executive_summary: true
    hardware_inventory: true
    health_check: true
    logical_configuration: true
    network_configuration: true
    port_mapping: true
    post_deployment_activities: true
    security_authentication: true
    switch_configuration: true
  validate_responses: true
health_check:
  include_in_report: false
  tiers:
    api: true
    switch_ssh: true
logging:
  backup_count: 5
  console_colors:
    CRITICAL: bold_red
    DEBUG: cyan
    ERROR: red
    INFO: green
    WARNING: yellow
  file_path: logs/vast_report_generator.log
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  level: INFO
  ops_log_dir: logs/operations
  ops_log_max_bytes: 1073741824
  ops_log_purge_fraction: 0.25
  rotation_size: 10485760
output:
  default_directory: ./reports
  json_filename: vast_data_{cluster_name}_{timestamp}.json
  pdf_filename: vast_report_{cluster_name}_{timestamp}.pdf
  timestamp_format: '%Y%m%d_%H%M%S'
report:
  organization: VAST Data Professional Services
  pdf:
    font_family: Helvetica
    font_size: 10
    include_page_numbers: true
    include_toc: true
  template:
    margin_bottom: 0.5
    margin_left: 0.5
    margin_right: 0.5
    margin_top: 0.5
    page_size: A4
security:
  mask_sensitive_data: true
  prompt_for_credentials: true
  sanitize_logs: true
  session_timeout: 3600
ssh:
  ping_timeout: 10
  proxy_jump: true
  tech_port_mode: true
  timeout: 60
