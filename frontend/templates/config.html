{% extends "base.html" %}
{% block title %}Configuration - VAST As-Built Reporter{% endblock %}

{% block content %}
<div class="page-header">
    <h1><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="28" height="28" style="margin-right:8px;vertical-align:middle;"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>Configuration</h1>
    <p class="subtitle">Edit application settings (config/config.yaml)</p>
</div>

<div class="card">
    <form id="configForm">
        <div class="config-toolbar">
            <button type="submit" class="btn btn-primary" id="btnSave">Save</button>
            <button type="button" class="btn btn-secondary" id="btnReset">Reset to Template</button>
            <span id="configStatus" class="config-status"></span>
        </div>
        <textarea id="config_text" name="config_text" class="config-editor" rows="30" spellcheck="false">{{ config_text }}</textarea>
    </form>
</div>

<script>
document.getElementById('configForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const status = document.getElementById('configStatus');
    try {
        const resp = await fetch('/config', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: new URLSearchParams({config_text: document.getElementById('config_text').value})
        });
        const data = await resp.json();
        if (resp.ok) {
            status.textContent = 'Saved successfully';
            status.className = 'config-status success';
        } else {
            status.textContent = data.error || 'Save failed';
            status.className = 'config-status error';
        }
    } catch (err) {
        status.textContent = 'Network error';
        status.className = 'config-status error';
    }
    setTimeout(() => status.textContent = '', 4000);
});

document.getElementById('btnReset').addEventListener('click', async function() {
    if (!confirm('Reset configuration to the default template?')) return;
    try {
        const resp = await fetch('/config/reset', {method: 'POST'});
        const data = await resp.json();
        if (data.config_text) document.getElementById('config_text').value = data.config_text;
        const status = document.getElementById('configStatus');
        status.textContent = 'Reset to template';
        status.className = 'config-status success';
        setTimeout(() => status.textContent = '', 4000);
    } catch (err) { /* ignore */ }
});
</script>
{% endblock %}
