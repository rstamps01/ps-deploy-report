# Build & Release: runs on every version tag (v*).
# Each new release MUST produce a new .dmg (and Windows .zip) built from the
# tagged commit (that release version's code). Artifacts are attached to the
# GitHub Release. See .cursor/rules/release-packaging-12.mdc.
name: Build & Release

on:
  push:
    tags:
      - "v*"

env:
  # Opt into Node.js 24 for actions (Node 20 deprecated on runners)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # -------------------------------------------------------------------
  # Quality gate: lint, format check, type check (Linux only).
  # Does not block build/release — every tag must produce .dmg/.zip (see rule).
  # -------------------------------------------------------------------
  quality-gate:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-release-quality-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-release-quality-

      - name: Install quality tools
        run: pip install flake8 black mypy types-requests types-PyYAML

      - name: Lint with flake8
        run: flake8 src/ tests/

      - name: Check formatting with black
        run: black --check --line-length 120 src/ tests/

      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports --no-strict-optional

  # -------------------------------------------------------------------
  # Run full test suite with coverage enforcement (Linux only).
  # Does not block build/release — every tag must produce .dmg/.zip (see rule).
  # -------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-release-test-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-release-test-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit and integration tests with coverage
        run: |
          python -m pytest tests/ -v \
            --ignore=tests/test_ui.py \
            --cov=src \
            --cov-report=xml \
            --cov-fail-under=60

  # -------------------------------------------------------------------
  # Build platform-specific bundles from the tagged release code (checkout at tag).
  #   Every release MUST produce VAST-Reporter-vX.Y.Z-mac.dmg and -win.zip (no exception).
  #   Runs on every tag push; not blocked by quality-gate or test.
  #   macOS = 10x Linux cost, Windows = 2x — pip cache added to both
  # -------------------------------------------------------------------
  build:
    strategy:
      fail-fast: false  # Run both macOS and Windows; one failure does not cancel the other
      matrix:
        include:
          - os: macos-latest
            artifact: VAST-Reporter-mac
            script: bash packaging/build-mac.sh
            pip-cache: ~/Library/Caches/pip
          - os: windows-latest
            artifact: VAST-Reporter-win
            script: powershell -ExecutionPolicy Bypass -File packaging/build-windows.ps1
            pip-cache: ~\AppData\Local\pip\Cache
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ${{ matrix.pip-cache }}
          key: ${{ runner.os }}-pip-release-build-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-release-build-

      - name: Install runtime + PyInstaller
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Ensure config files exist (Windows; cluster_profiles.json + config.yaml are gitignored)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path config | Out-Null
          if (!(Test-Path config/cluster_profiles.json)) { '{}' | Set-Content -Path config/cluster_profiles.json }
          # RM-1 Supplementary untracked config/config.yaml; the PyInstaller
          # spec still bundles it, so seed from the committed template.
          if (!(Test-Path config/config.yaml)) { Copy-Item config/config.yaml.template config/config.yaml }

      - name: Ensure config files exist (macOS/Linux; cluster_profiles.json + config.yaml are gitignored)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p config
          [ -f config/cluster_profiles.json ] || echo '{}' > config/cluster_profiles.json
          # RM-1 Supplementary untracked config/config.yaml; the PyInstaller
          # spec still bundles it, so seed from the committed template.
          [ -f config/config.yaml ] || cp config/config.yaml.template config/config.yaml

      - name: Install macOS build deps (cairo for SVG diagrams, create-dmg for .dmg)
        if: matrix.os == 'macos-latest'
        run: brew install cairo create-dmg

      - name: Build
        run: ${{ matrix.script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  # -------------------------------------------------------------------
  # Create GitHub release and attach assets (Linux only)
  # -------------------------------------------------------------------
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: VAST-Reporter-mac
          path: artifacts/mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: VAST-Reporter-win
          path: artifacts/win

      - name: Prepare release assets
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # macOS — DMG (preferred) or zip the .app bundle
          if ls artifacts/mac/*.dmg 1>/dev/null 2>&1; then
            cp artifacts/mac/*.dmg "VAST-Reporter-${TAG}-mac.dmg"
          elif [ -d "artifacts/mac/VAST Reporter.app" ]; then
            cd artifacts/mac && zip -r "../../VAST-Reporter-${TAG}-mac.zip" "VAST Reporter.app" && cd ../..
          else
            echo "::error::No macOS artifact: no .dmg and no VAST Reporter.app"
            exit 1
          fi
          # Windows — zip created by packaging/build-windows.ps1 (VAST-Reporter-vX.Y.Z-win.zip)
          if ls artifacts/win/*.zip 1>/dev/null 2>&1; then
            cp artifacts/win/*.zip "VAST-Reporter-${TAG}-win.zip"
          elif [ -d "artifacts/win/VAST Reporter" ]; then
            cd artifacts/win && zip -r "../../VAST-Reporter-${TAG}-win.zip" "VAST Reporter" && cd ../..
          else
            echo "::error::No Windows artifact: no .zip and no VAST Reporter folder"
            exit 1
          fi

      - name: Extract release notes
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VER="${TAG#v}"
          NOTES_FILE="RELEASE_NOTES_${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "body_path=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          else
            echo "body_path=CHANGELOG.md" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.body_path }}
          files: |
            VAST-Reporter-*.dmg
            VAST-Reporter-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
