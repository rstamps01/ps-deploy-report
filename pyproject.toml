[tool.black]
line-length = 120

[tool.pytest.ini_options]
testpaths = ["tests"]
# cov-fail-under=60: raised after Test Coverage Extension Plan; target 75%+ per TSE-9
addopts = "--cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=60"
markers = [
    "integration: full pipeline integration tests",
    "ui: browser-based UI tests (require Playwright)",
    "slow: tests that take more than 5 seconds",
]

[tool.coverage.run]
omit = [
    "src/comprehensive_report_template.py",
    "src/enhanced_report_builder.py",
    "src/session_manager.py",
]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
check_untyped_defs = true

[tool.bandit]
exclude_dirs = ["tests", "venv", ".venv"]
skips = ["B101"]
